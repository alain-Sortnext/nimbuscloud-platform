# NimbusCloud Platform — Kubernetes Secret Template
# ⚠️ BUG: payment-api deployment references secret "payment-api-secrets"
#         but this file creates "nimbuscloud-secrets"
#         Candidate must EITHER:
#           a) Create a separate secret named "payment-api-secrets", OR
#           b) Add payment-api keys to this secret and update its name
#
# ⚠️ NOTE: Values below are base64-encoded PLACEHOLDERS
#          Real secrets must come from AWS Secrets Manager (see Phase 3)
#          Do NOT store real credentials in this file
apiVersion: v1
kind: Secret
metadata:
  name: nimbuscloud-secrets
  namespace: default
  labels:
    app: nimbuscloud-platform
type: Opaque
data:
  # base64 encoded placeholders — replace with real values from Secrets Manager
  JWT_SECRET: "UkVQTEFDRV9XSVRIX1NFQ1JFVFM="
  AWS_ACCESS_KEY_ID: "UkVQTEFDRV9XSVRIX1NFQ1JFVFM="
  AWS_SECRET_ACCESS_KEY: "UkVQTEFDRV9XSVRIX1NFQ1JFVFM="
  # payment-api-secrets are MISSING — see payment-api deployment reference
