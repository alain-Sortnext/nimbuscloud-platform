# NimbusCloud Platform — Kubernetes Services
apiVersion: v1
kind: Service
metadata:
  name: booking-api
  namespace: default
  labels:
    app: booking-api
spec:
  selector:
    app: booking-api
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: default
  labels:
    app: payment-api
spec:
  selector:
    app: payment-api
  ports:
    - name: http
      port: 3002
      targetPort: 3002
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
