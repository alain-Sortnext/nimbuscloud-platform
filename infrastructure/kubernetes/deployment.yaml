# NimbusCloud Platform — Kubernetes Deployments
# ⚠️ Multiple issues present — see inline comments
# Last modified: 2026-04-25 (Jordan Reeves)

---
# ─────────────────────────────────────────────
# booking-api
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-api
  namespace: default
  labels:
    app: booking-api
    version: "2.4.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-api
  template:
    metadata:
      labels:
        app: booking-api
        version: "2.4.1"
    spec:
      containers:
        - name: booking-api
          image: nimbuscloud/booking-api:2.4.1
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            # ⚠️ BUG: references key "DB_HOST" but ConfigMap has "DATABASE_HOST"
            # This causes CrashLoopBackOff — pod starts then crashes immediately
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: nimbuscloud-config
                  key: DB_HOST        # ← WRONG KEY — should be DATABASE_HOST
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: nimbuscloud-config
                  key: AWS_REGION
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: nimbuscloud-config
                  key: ENVIRONMENT
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
# ─────────────────────────────────────────────
# payment-api
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: default
  labels:
    app: payment-api
    version: "2.4.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
        version: "2.4.1"
    spec:
      containers:
        - name: payment-api
          image: nimbuscloud/payment-api:2.4.1
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            # ⚠️ BUG: secret "payment-api-secrets" does not exist
            # Pod will fail to start with: secret "payment-api-secrets" not found
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-api-secrets   # ← SECRET DOES NOT EXIST
                  key: STRIPE_API_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: payment-api-secrets   # ← SECRET DOES NOT EXIST
                  key: STRIPE_WEBHOOK_SECRET
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: nimbuscloud-config
                  key: AWS_REGION
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
# ─────────────────────────────────────────────
# auth-service
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
  labels:
    app: auth-service
    version: "2.4.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        version: "2.4.1"
    spec:
      containers:
        - name: auth-service
          image: nimbuscloud/auth-service:2.4.1
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nimbuscloud-secrets
                  key: JWT_SECRET
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: nimbuscloud-config
                  key: AWS_REGION
          # ⚠️ BUG: readiness probe hits /health but service exposes /healthz
          # Pod starts but NEVER becomes Ready — stuck in 0/1 state
          readinessProbe:
            httpGet:
              path: /health        # ← WRONG PATH — service exposes /healthz
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# ─────────────────────────────────────────────
# notification-service
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: default
  labels:
    app: notification-service
    version: "2.4.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: "2.4.1"
    spec:
      containers:
        - name: notification-service
          image: nimbuscloud/notification-service:2.4.1
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: SQS_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: nimbuscloud-config
                  key: SQS_QUEUE_NAME
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: nimbuscloud-config
                  key: AWS_REGION
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
